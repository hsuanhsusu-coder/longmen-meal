<script>
(function(){
  function show(msg){
    var d = document.getElementById('error-display');
    if (!d) { alert(msg); return; }
    d.style.display = 'block';
    d.textContent = (d.textContent ? d.textContent + '\n\n' : '') + msg;
  }
  window.addEventListener('error', function(e){
    show('⚠ ERROR: ' + (e.message||'unknown') + '\nFile: ' + (e.filename||'?') + ':' + (e.lineno||'?') + ':' + (e.colno||'?') + (e.error&&e.error.stack ? '\n'+e.error.stack : ''));
  });
  window.addEventListener('unhandledrejection', function(e){
    show('⚠ PROMISE: ' + (e.reason && e.reason.message ? e.reason.message : (e.reason||'unknown')));
  });
})();
</script>
